control_rate_hz: 50.0
status_rate_hz: 10.0
odom_topic: /quad_0/body_pose
odom_twist_in_world_frame: true
default_route_z: 0.3
default_max_vx: 0.4
mqtt:
  enabled: true
  host: 127.0.0.1
  port: 1883
  keepalive_sec: 30
  client_id: navdog_runtime
  qos: 1
  task_topic: robot/global_planning/info
  pause_topic: robot/local_planning/pause_resume
  status_topic: robot/local_planning/ctrl
  max_queue_size: 32
manager:
  max_vel: 0.75
  max_acc: 0.5
  max_jerk: 4.0
  control_points_distance: 0.2
  feasibility_tolerance: 0.5
  planning_horizon: 7.5
optimization:
  lambda_smooth: 1.0
  lambda_collision: 1.0
  lambda_feasibility: 0.1
  lambda_fitness: 1.0
  dist0: 0.2
  max_vel: 0.75
  vel_tolerance: 1.0
  max_acc: 0.5
  acc_tolerance: 1.0
grid_map:
  need_extrinsic: false
  sensor_type: lidar
  cloud_is_world: true
  resolution: 0.05
  sliding_map_size_x: 10.0
  sliding_map_size_y: 10.0
  sliding_map_size_z: 5.0
  map_sliding_thresh: 0.2
  double_cylinder_radius: 0.25
  double_cylinder_offset: 0.18
  obstacles_inflation_z_up: 0.1
  obstacles_inflation_z_down: 0.4
  p_hit: 0.85
  p_miss: 0.3
  p_min: 0.12
  p_max: 0.98
  p_occ: 0.8
  max_ray_length: 5.0
  vis_height: 0.3
limits:
  max_vx: 0.5
  max_vy: 0.12
  max_yaw_rate: 0.65
  max_accel_x: 0.5
  max_accel_y: 0.25
  max_accel_yaw: 0.8
route_corridor:
  lookahead_distance_m: 2.5
navigation:
  # 路线前方该距离内检测到障碍物，允许切换到SCAN模式
  enter_blocked_distance_m: 2.0
  # 普通障碍物连续确认时间；50hz下等于n连续两个控制周期
  enter_confirm_sec: 0.04
  # 障碍距离小于该值时，不等待确认，立即进入SCAN模式
  immediate_enter_distance_m: 0.45
  # 进入SCAN后至少保持的a时间，防止刚进入就退出
  min_local_avoid_hold_sec: 1.0
  # 满足清空条件后持续多久才退出SCAN模式
  exit_clear_confirm_sec: 0.50
  # 退出SCAN要求的前，左，右的安全距离
  exit_front_clearance_m: 2.50
  exit_left_clearance_m: 0.60
  exit_right_clearance_m: 0.60
route_follower:
  lookahead_distance_m: 0.6
  kp_x: 0.8
  kp_y: 0.6
  kp_yaw: 1.2
  heading_turn_only_threshold_rad: 0.2
  max_vx: 0.5
route_corridor_observation:
  map_timeout_sec: 1.5
  max_progress_lag_m: 0.5
safety:
  slow_down_front: 1.5
  emergency_stop: 0.45
  odom_timeout_sec: 0.5
  obstacle_timeout_sec: 1.5
  planner_cmd_timeout_sec: 0.3
  future_tolerance_sec: 0.05
start_align:
  enter_deg: 15.0
  exit_deg: 5.0
  max_hold_sec: 8.0
  kp_yaw: 1.5
  max_yaw_rate: 0.65
  target_min_dist_m: 0.2
