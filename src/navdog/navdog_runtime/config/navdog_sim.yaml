control_rate_hz: 50.0
status_rate_hz: 10.0
odom_topic: /quad_0/body_pose
cmd_vel_topic: /navdog/route_cmd_vel
native_scan_takeover: true
native_scan_rejoin:
  min_forward_distance_m: 0.8
  preferred_forward_distance_m: 1.2
  max_forward_distance_m: 2.0
  no_progress_timeout_sec: 3.0
  min_progress_improvement_m: 0.10
  max_republish_count: 2
  release_front_clearance_m: 2.0
  release_side_clearance_m: 0.5
odom_twist_in_world_frame: true
default_route_z: 0.3
default_max_vx: 0.4
mqtt:
  enabled: true
  host: 127.0.0.1
  port: 1883
  keepalive_sec: 30
  client_id: navdog_runtime
  qos: 1
manager:
  max_vel: 0.75
  max_acc: 0.5
  max_jerk: 4.0
  control_points_distance: 0.2
  feasibility_tolerance: 0.5
  planning_horizon: 7.5
optimization:
  lambda_smooth: 1.0
  lambda_collision: 1.0
  lambda_feasibility: 0.1
  lambda_fitness: 1.0
  dist0: 0.2
  max_vel: 0.75
  vel_tolerance: 1.0
  max_acc: 0.5
  acc_tolerance: 1.0
grid_map:
  need_extrinsic: false
  sensor_type: lidar
  cloud_is_world: true
  resolution: 0.05
  sliding_map_size_x: 10.0
  sliding_map_size_y: 10.0
  sliding_map_size_z: 5.0
  map_sliding_thresh: 0.2
  double_cylinder_radius: 0.25
  double_cylinder_offset: 0.18
  obstacles_inflation_z_up: 0.1
  obstacles_inflation_z_down: 0.4
  p_hit: 0.85
  p_miss: 0.3
  p_min: 0.12
  p_max: 0.98
  p_occ: 0.8
  max_ray_length: 5.0
  vis_height: 0.3
limits:
  max_vx: 0.5
  max_vy: 0.12
  max_yaw_rate: 0.65
  max_accel_x: 0.5
  max_accel_y: 0.25
  max_accel_yaw: 0.8
navigation_mode:
  avoid_enter_distance_m: 1.5
  avoid_immediate_distance_m: 0.65
  avoid_block_confirm_sec: 0.15
  local_avoid_min_hold_sec: 0.80
  route_clear_confirm_sec: 0.60
  rejoin_lateral_tolerance_m: 0.25
  rejoin_heading_tolerance_rad: 0.35
  rejoin_confirm_sec: 0.40
route_corridor:
  lookahead_distance_m: 3.0
route_follower:
  lookahead_distance_m: 0.6
  kp_x: 0.8
  kp_y: 0.6
  kp_yaw: 1.2
  heading_turn_only_threshold_rad: 0.2
  max_vx: 0.5
trajectory_follower:
  time_forward_sec: 0.5
  kp_pos: 0.8
  kp_yaw: 1.5
  heading_turn_only_threshold_rad: 0.2
planner_trigger:
  replan_retry_interval_sec: 0.3
  target_change_threshold_m: 0.5
  min_remaining_duration_sec: 0.05
  trajectory_expiry_margin_sec: 0.2
  trajectory_source_max_age_sec: 1.0
  trajectory_future_tolerance_sec: 0.05
route_corridor_observation:
  map_timeout_sec: 1.5
  max_progress_lag_m: 0.5
safety:
  slow_down_front: 1.5
  emergency_stop: 0.45
  odom_timeout_sec: 0.5
  obstacle_timeout_sec: 1.5
  planner_cmd_timeout_sec: 0.3
  future_tolerance_sec: 0.05
start_align:
  enter_deg: 15.0
  exit_deg: 5.0
  max_hold_sec: 8.0
  kp_yaw: 1.5
  max_yaw_rate: 0.65
  target_min_dist_m: 0.2
